<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "RSGAtext">
        <h1>RSGA</h1>
    </div>
    <div class = "shadow"></div>

    <div class = "rect"></div>

    <div class = "form">
        <h1>Time to begin!</h1>

        <div class = "inputContainer">
            <label>Enter your email address:</label>
            <div class = "inputSubContainer">
                <input class = "inputField" type = "email" />
                <select class = "gradeSelect">
                    <option value = "3">Grade 3</option>
                    <option value = "4">Grade 4</option>
                    <option value = "5">Grade 5</option>
                    <option value = "6">Grade 6</option>
                    <option value = "7">Grade 7</option>
                    <option value = "8">Grade 8</option>
                    <option value = "9">Grade 9</option>
                    <option value = "10">Grade 10</option>
                    <option value = "11">Grade 11</option>
                    <option value = "12">Grade 12</option>    
                </select>
                <select class = "shiftSelect">
                    <option value = "day">Day</option>
                    <option value = "morning">Morning</option>  
                </select>
                <button class = "visibilityBtn" onclick="pass_change_type()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="undefined"><path d="M480-320q75 0 127.5-52.5T660-500q0-75-52.5-127.5T480-680q-75 0-127.5 52.5T300-500q0 75 52.5 127.5T480-320Zm0-72q-45 0-76.5-31.5T372-500q0-45 31.5-76.5T480-608q45 0 76.5 31.5T588-500q0 45-31.5 76.5T480-392Zm0 192q-146 0-266-81.5T40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200Zm0-300Zm0 220q113 0 207.5-59.5T832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T128-500q50 101 144.5 160.5T480-280Z"/></svg></button>
            </div>
        </div>
        <div class = "proceedBtnGrp">
            <button class = "proceedBtnDown" onclick="proceedDown()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="undefined"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg></button>
            <button class = "proceedBtnUp" onclick="proceedUp()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="undefined"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg></button>
        </div>
        </button>
        <div class = "yesAccount">
            <p>Already have an account?</p>
            <button class="signInNormalBtn" onclick="redirectSignIn()">
                <p>Sign In</p>
                <svg xmlns="http://www.w3.org/2000/svg" height="26px" viewBox="0 -960 960 960" width="26px" fill="undefined"><path d="M480-120v-80h280v-560H480v-80h280q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H480Zm-80-160-55-58 102-102H120v-80h327L345-622l55-58 200 200-200 200Z"/></svg>
            </button>
        </div>
    </div>
</body>
<script src = "script.js"></script>
</html>
